spring:
  application:
    name: ajouchong
  profiles:
    active: prod
  jpa:
    show-sql: true
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            redirect-uri: ${URI}
            scope: # google API의 범위 값
              - profile
              - email

jwt:
  secret: ${secret}
#  expiration_time: 86400000 #1일
server:
  port: 8080

file:
  dir: ${DIR}
