spring:
  application:
    name: ajouchong
  config:
    import: optional:file:./.env
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  profiles:
    active: prod
    include: oauth
  jpa:
    show-sql: true
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
  spring:
    servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 10MB
  jackson:
    time-zone: Asia/Seoul

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080

cloud:
  aws:
    s3:
      bucket: ${BUCKET_NAME}
    stack.auto: false
    region.static: ap-northeast-2
    credentials:
      access-key: ${ACCESS_KEY}
      secret-key: ${SECRET_KEY}